<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sudoku photo-import evaluation</title>
  <link rel="stylesheet" href="photo-harness.css">
</head>
<body>
  <main>
    <h1>Photo-import evaluation</h1>
    <p>This developer tool runs locally. Images are decoded in this browser and are not uploaded.</p>

    <section class="panel controls">
      <label class="file-button">Choose screenshots or photos
        <input id="images" type="file" accept="image/*" multiple>
      </label>
      <label>Expected grids JSON (optional)
        <input id="ground-truth" type="file" accept="application/json,.json">
      </label>
      <button id="run" type="button" disabled>Run evaluation</button>
      <button id="export" type="button" disabled>Export report</button>
      <button id="export-cells" type="button" disabled>Export labeled cells</button>
    </section>

    <p id="status" role="status" aria-live="polite">Choose at least one image.</p>
    <section id="summary" class="panel" hidden></section>
    <section id="results" aria-label="Image results"></section>
  </main>
  <script type="module" src="photo-harness.js"></script>
</body>
</html>
